<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maya-Morphe P1 · FAQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --teal:   #00d4aa;
  --gold:   #d4a800;
  --red:    #e05050;
  --purple: #a070d4;
  --bg:     #080c10;
  --panel:  #0e1520;
  --panel2: #121c2a;
  --border: #1a2d40;
  --text:   #c8dce8;
  --dim:    #5a7a8a;
  --white:  #eef4f8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  min-height: 100vh;
}

/* Starfield */
#stars { position:fixed; inset:0; z-index:0; pointer-events:none; }

.wrap { position:relative; z-index:1; max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

/* Header */
.faq-header { text-align: center; margin-bottom: 40px; }
.faq-header h1 {
  font-family: 'Cinzel', serif;
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--teal);
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.faq-header .sub {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  color: var(--dim);
  font-size: 1rem;
  margin-bottom: 20px;
}
.faq-header .links {
  display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
}
.faq-header .links a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--teal);
  text-decoration: none;
  padding: 5px 14px;
  border: 1px solid var(--teal);
  border-radius: 20px;
  transition: background 0.2s;
}
.faq-header .links a:hover { background: rgba(0,212,170,0.1); }

/* Lang + search row */
.controls-row {
  display: flex; gap: 12px; align-items: center;
  margin-bottom: 20px; flex-wrap: wrap;
}
.lang-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--dim);
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.2s;
}
.lang-btn.active, .lang-btn:hover {
  border-color: var(--teal); color: var(--teal);
  background: rgba(0,212,170,0.08);
}
.search-wrap { flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%;
  padding: 8px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--teal); }
.search-wrap input::placeholder { color: var(--dim); }

/* Tag filters */
.tag-row {
  display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
}
.tag-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--dim);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.tag-btn[data-tag="all"].active    { border-color: var(--white); color: var(--white); }
.tag-btn[data-tag="silly"].active  { border-color: var(--gold); color: var(--gold); background: rgba(212,168,0,0.1); }
.tag-btn[data-tag="technical"].active { border-color: var(--teal); color: var(--teal); background: rgba(0,212,170,0.1); }
.tag-btn[data-tag="philosophical"].active { border-color: var(--purple); color: var(--purple); background: rgba(160,112,212,0.1); }
.tag-btn[data-tag="research"].active { border-color: var(--red); color: var(--red); background: rgba(224,80,80,0.1); }

/* FAQ items */
.faq-item {
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.faq-item:hover { border-color: rgba(0,212,170,0.3); }
.faq-item.hidden { display: none; }

.faq-q {
  padding: 16px 20px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  background: var(--panel);
  user-select: none;
}
.faq-q-text {
  font-family: 'Crimson Pro', serif;
  font-size: 1.05rem;
  color: var(--white);
  line-height: 1.4;
  flex: 1;
}
.faq-q-right {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.faq-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.faq-tag.silly       { border-color: var(--gold);   color: var(--gold); }
.faq-tag.technical   { border-color: var(--teal);   color: var(--teal); }
.faq-tag.philosophical { border-color: var(--purple); color: var(--purple); }
.faq-tag.research    { border-color: var(--red);    color: var(--red); }

.faq-arrow {
  color: var(--dim);
  font-size: 0.8rem;
  transition: transform 0.25s;
  margin-top: 2px;
}
.faq-item.open .faq-arrow { transform: rotate(180deg); }

.faq-a {
  display: none;
  padding: 0 20px 18px;
  background: var(--panel2);
  border-top: 1px solid var(--border);
}
.faq-item.open .faq-a { display: block; }
.faq-a p {
  font-family: 'Crimson Pro', serif;
  font-size: 0.98rem;
  line-height: 1.75;
  color: var(--text);
  padding-top: 14px;
}
.faq-a code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  background: rgba(0,212,170,0.08);
  padding: 1px 6px;
  border-radius: 3px;
  color: var(--teal);
}
.faq-a .highlight { color: var(--teal); }
.faq-a .gold { color: var(--gold); }

/* No results */
#noResults {
  display: none;
  text-align: center;
  padding: 40px;
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  color: var(--dim);
}

/* Footer */
.faq-footer {
  text-align: center;
  margin-top: 40px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  color: var(--dim);
}
.faq-footer a { color: var(--teal); text-decoration: none; }
</style>

<script>
// ── STARFIELD ─────────────────────────────────────────────────────
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const stars = Array.from({length: 150}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    r: Math.random()*1+0.2, a: Math.random(),
    da: (Math.random()-0.5)*0.003
  }));
  function tick(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      s.a += s.da;
      if(s.a<=0||s.a>=1) s.da*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(0,212,170,${s.a*0.4})`; ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  tick();
})();

// ── FAQ DATA ──────────────────────────────────────────────────────
const FAQ = [
  {

    en_q: "Did you actually teach a lizard to grow its tail back?",

  },
  {

  },
  {

  {

    en_a: "FRR is the fraction of <span class='highlight'>severed computational nodes</span> that restore function within a defined simulation window. Formally: <code>FRR = alive_severed / total_severed</code> where alive_severed counts only the cells that were below the cut point, not the stump. A fixed-topology network has FRR = 0% by definition — it cannot restore severed nodes. Our voltage-driven network achieved 99.7% mean FRR across 12 trials.",

    en_a: "Vairagya (वैराग्य, Sanskrit for 'detachment') governs how quickly the bioelectric gradient attenuates with distance. The value <span class='highlight'>0.002315</span> is derived directly from the author's ORCID identifier: 0000-0002-<b>3315</b>-7907 → 0.002315. It serves a dual purpose: a physically meaningful decay constant and an embedded provenance signature. Every model parameter carrying this value is traceable to ORCID 0000-0002-3315-7907.",

  {
    tag: 'technical',

// ── RENDER ────────────────────────────────────────────────────────
let currentLang = 'en';
let currentTag  = 'all';

function setLang(lang){
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active',
      b.textContent.trim() === lang.toUpperCase() ||
      (lang==='hi' && b.textContent.includes('हि')) ||
      (lang==='zh' && b.textContent.includes('中')));
  });
  renderFaq();
}

function setTag(tag, btn){
  currentTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterFaq();
}

function renderFaq(){
  const list = document.getElementById('faqList');
  list.innerHTML = FAQ.map((q, i) => {
    const question = q[currentLang+'_q'] || q.en_q;
    const answer   = q[currentLang+'_a'] || q.en_a;
    return `
      <div class="faq-item" data-idx="${i}" data-tag="${q.tag}" onclick="toggleItem(this)">
        <div class="faq-q">
          <div class="faq-q-text">${question}</div>
          <div class="faq-q-right">
            <span class="faq-tag ${q.tag}">${q.tag}</span>
            <span class="faq-arrow">▼</span>
          </div>
        </div>
        <div class="faq-a"><p>${answer}</p></div>
      </div>`;
  }).join('');
  filterFaq();
}

function toggleItem(el){
  el.classList.toggle('open');
}

function filterFaq(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  let visible = 0;
  document.querySelectorAll('.faq-item').forEach((el, i) => {
    const faq = FAQ[parseInt(el.dataset.idx)];
    const question = (faq[currentLang+'_q'] || faq.en_q).toLowerCase();
    const answer   = (faq[currentLang+'_a'] || faq.en_a).toLowerCase();
    const tagOk  = currentTag === 'all' || faq.tag === currentTag;
    const textOk = !q || question.includes(q) || answer.includes(q);
    const show = tagOk && textOk;
    el.classList.toggle('hidden', !show);
    if(show) visible++;
  });
  document.getElementById('noResults').style.display = visible===0 ? 'block' : 'none';
}

renderFaq();
</script>
